        /* ════════════════════════════════════════════
           STATE
        ════════════════════════════════════════════ */
        const CAT_COLORS = ['#c8f060', '#60b4f0', '#b07ef0', '#ffbb45', '#ff6b6b', '#60f0c8', '#f060b0', '#f0a060'];
        const STORE = 'profitlab_v3';

        let ST = { lang: 'en', saved: [], cats: [], selColor: CAT_COLORS[0], saveTarget: null, renameTarget: null };
        let rObjs = [], nObjs = [];
        let rId = 0, nId = 0;
        let rChart = null, nChart = null;

        /* ── persist ── */
        function loadSt() {
            try {
                const d = JSON.parse(localStorage.getItem(STORE) || '{}');
                if (d.saved) ST.saved = d.saved;
                if (d.cats) ST.cats = d.cats;
                if (d.lang) ST.lang = d.lang;
                if (d.theme) applyTheme(d.theme, false);
            } catch (e) { }
        }
        function saveStLocal() {
            localStorage.setItem(STORE, JSON.stringify({ saved: ST.saved, cats: ST.cats, lang: ST.lang, theme: document.documentElement.dataset.theme }));
            updateBadges();
        }
        function saveSt() {
            saveStLocal();
            if (typeof _currentUser !== "undefined" && _currentUser) cloudSave();
        }

        /* ── i18n ── */
        function t(k) { return L[ST.lang]?.[k] ?? L.en[k] ?? k }
        function applyI18n() {
            document.querySelectorAll('[data-i]').forEach(el => {
                const v = t(el.dataset.i);
                if (typeof v === 'string') el.textContent = v;
            });
            const si = document.getElementById('searchInput');
            if (si) si.placeholder = t('search_ph');
            const lb = document.getElementById('langLabel'); if (lb) lb.textContent = LANG_LABELS[ST.lang] || ST.lang.toUpperCase();
            rebuildSelects();
            updateBadges();
        }
        const LANG_LABELS = { en: 'Language', ru: 'Язык', uk: 'Мова' };
        function setLang(l) {
            ST.lang = l;
            const lb = document.getElementById('langLabel'); if (lb) lb.textContent = LANG_LABELS[l] || l.toUpperCase();
            closeLangMenu();
            applyI18n();
            renderResaleObjs(); renderRentalObjs();
            renderSavedPage(); renderCatPage(); renderCatSidebar();
            saveSt();
        }

        /* ════════════════════════════════════════════
           RESPONSIVE: sidebar vs bottom-nav logic
        ════════════════════════════════════════════ */
        const MOBILE_BP = 600;
        const COLLAPSE_BP = 900;

        function onResize() {
            const w = window.innerWidth;
            const body = document.body;
            const bn = document.getElementById('bottomNav');
            const sb = document.getElementById('sidebar');
            const so = document.getElementById('sidebarOverlay');

            if (w <= MOBILE_BP) {
                // mobile: bottom nav on, sidebar off-canvas
                bn.style.display = 'block';
                body.classList.add('has-bottom-nav');
                // ensure overlay is in DOM but hidden when sidebar closed
                if (!sb.classList.contains('mobile-open')) {
                    so.style.display = 'none';
                }
            } else {
                // desktop/tablet: hide bottom nav, close mobile sidebar
                bn.style.display = 'none';
                body.classList.remove('has-bottom-nav');
                sb.classList.remove('mobile-open');
                so.style.display = 'none';
            }
        }

        function openMobileSidebar() {
            const sb = document.getElementById('sidebar');
            const so = document.getElementById('sidebarOverlay');
            sb.classList.add('mobile-open');
            so.style.display = 'block';
        }
        function closeMobileSidebar() {
            const sb = document.getElementById('sidebar');
            const so = document.getElementById('sidebarOverlay');
            sb.classList.remove('mobile-open');
            so.style.display = 'none';
        }
        function toggleSidebarCollapse() {
            // on 600-900px range, toggle .expanded (sidebar starts collapsed via CSS)
            // on >900px, toggle .collapsed (sidebar starts expanded)
            const sb = document.getElementById('sidebar');
            if (window.innerWidth <= 900) {
                sb.classList.toggle('expanded');
            } else {
                sb.classList.toggle('collapsed');
            }
        }
        function handleSidebarToggle() {
            if (window.innerWidth <= MOBILE_BP) {
                const sb = document.getElementById('sidebar');
                if (sb.classList.contains('mobile-open')) closeMobileSidebar();
                else openMobileSidebar();
            } else {
                toggleSidebarCollapse();
            }
        }
        function toggleLangMenu(e) {
            e.stopPropagation();
            const m = document.getElementById('langMenu');
            const isOpen = m.classList.contains('open');
            if (isOpen) { m.classList.remove('open'); }
            else { m.classList.add('open'); updateLangMenu(); }
        }
        function closeLangMenu() {
            document.getElementById('langMenu')?.classList.remove('open');
        }
        function updateLangMenu() {
            const btns = document.querySelectorAll('#langMenu button');
            btns.forEach(b => {
                const l = b.getAttribute('onclick').match(/'(\w+)'/)?.[1];
                b.classList.toggle('active', l === ST.lang);
            });
        }

        window.addEventListener('resize', onResize);

        /* ════════════════════════════════════════════
           NAVIGATION
        ════════════════════════════════════════════ */
        const PAGE_TITLES = {
            resale: () => `<em>${t('nav_resale')}</em>`,
            rental: () => `<em>${t('nav_rental')}</em>`,
            saved: () => `<em>${t('nav_saved')}</em>`,
            cats: () => `<em>${t('nav_cats')}</em>`,
        };

        function goPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item,.bn-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            const ni = document.getElementById('ni-' + p); if (ni) ni.classList.add('active');
            const bn = document.getElementById('bn-' + p); if (bn) bn.classList.add('active');
            document.getElementById('topbarTitle').innerHTML = PAGE_TITLES[p]();
            document.getElementById('scrollBody').scrollTop = 0;
            if (p === 'saved') renderSavedPage();
            if (p === 'cats') renderCatPage();
            closeLangMenu();
            if (window.innerWidth <= MOBILE_BP) closeMobileSidebar();
        }

        function switchCalcTab(type, mode) {
            const cp = document.getElementById(`${type}-calc-pane`);
            const sp = document.getElementById(`${type}-saved-pane`);
            const tc = document.getElementById(`ct-${type}-calc`);
            const ts = document.getElementById(`ct-${type}-saved`);
            tc.classList.toggle('active', mode === 'calc');
            ts.classList.toggle('active', mode === 'saved');
            cp.style.display = mode === 'calc' ? 'block' : 'none';
            sp.style.display = mode === 'saved' ? 'block' : 'none';
            if (mode === 'saved') renderCalcSaved(type);
        }

        /* ════════════════════════════════════════════
           THEME
        ════════════════════════════════════════════ */
        function applyTheme(th, save = true) {
            document.documentElement.dataset.theme = th;
            const btn = document.getElementById('themeBtn');
            const isDark = th === 'dark';
            if (btn) {
                btn.querySelector('use').setAttribute('href', isDark ? '#ic-sun' : '#ic-moon');
                const lbl = btn.querySelector('.sf-label');
                if (lbl) lbl.textContent = t(isDark ? 'theme_light' : 'theme_dark');
            }
            if (save) saveSt();
            setTimeout(() => { renderResaleChart(); renderRentalChart(); }, 60);
        }
        function toggleTheme() { applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'); }

        /* ════════════════════════════════════════════
           SAFE NUMBER — prevents crash on huge values
        ════════════════════════════════════════════ */
        const MAX = 1e12;
        function sn(v) { const n = parseFloat(v); if (!isFinite(n) || isNaN(n)) return 0; return Math.min(Math.max(n, -MAX), MAX) }
        function gn(id) { return sn(document.getElementById(id)?.value) }
        function fmt(n) {
            if (!isFinite(n)) return '—';
            const a = Math.abs(n);
            if (a >= 1e9) return (n / 1e9).toFixed(2) + 'B';
            if (a >= 1e6) return (n / 1e6).toFixed(2) + 'M';
            if (a >= 1e3) return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            return n.toFixed(2);
        }
        function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') }
        function sel(id, v) { const e = document.getElementById(id); if (e) e.textContent = v }
        function scl(id, c) { const e = document.getElementById(id); if (e) e.className = c }

        /* ════════════════════════════════════════════
           RESALE CALCULATOR
        ════════════════════════════════════════════ */
        function addResaleObj(d) {
            const id = ++rId;
            rObjs.push({ id, name: d?.name || '', purchase: d?.purchase || '', selling: d?.selling || '', delivery: d?.delivery || '', commission: d?.commission || '', qty: d?.qty || '1', open: true });
            renderResaleObjs();
        }
        function removeResaleObj(id) { rObjs = rObjs.filter(o => o.id !== id); renderResaleObjs() }

        function calcR(id) {
            const sell = gn(`ro_${id}_s`); const buy = gn(`ro_${id}_p`); const del = gn(`ro_${id}_d`);
            const cp = Math.min(100, Math.max(0, gn(`ro_${id}_c`)));
            const qty = Math.max(1, Math.round(gn(`ro_${id}_q`)) || 1);
            const comm = sell * cp / 100; const per = sell - buy - del - comm;
            return { sell, buy, del, comm, per, total: per * qty, margin: sell > 0 ? per / sell * 100 : 0, qty };
        }

        function renderResaleObjs() {
            const w = document.getElementById('resaleObjects');
            if (!rObjs.length) {
                w.innerHTML = `<div class="empty"><div class="empty-icon"><svg class="ico" style="width:36px;height:36px"><use href="#ic-box"/></svg></div>${t('empty_items')}</div>`;
                renderResaleSummary(); renderResaleChart(); return;
            }
            w.innerHTML = rObjs.map(o => rObjHTML(o)).join('');
            rObjs.forEach(o => {
                [['p', 'purchase'], ['s', 'selling'], ['d', 'delivery'], ['c', 'commission'], ['q', 'qty']].forEach(([k, f]) => {
                    const el = document.getElementById(`ro_${o.id}_${k}`);
                    if (el) { el.value = o[f] || ''; el.oninput = () => syncR(o.id); }
                });
                const ne = document.getElementById(`ro_${o.id}_n`);
                if (ne) { ne.value = o.name || ''; ne.oninput = () => { o.name = ne.value; sel(`ro_${o.id}_disp`, o.name || t('f_name')); }; }
            });
            updateResaleResults();
        }

        function rObjHTML(o) {
            const r = calcR(o.id); const pos = r.per >= 0;
            const sv = sn(o.selling);
            return `<div class="obj-card" id="roc-${o.id}">
<div class="obj-header" onclick="toggleRBody(${o.id})">
  <div class="obj-left">
    <div class="obj-title" id="ro_${o.id}_disp">${esc(o.name) || t('f_name')}</div>
    <div class="obj-sub">${t('f_qty')}: ${o.qty || 1} &middot; ${t('f_selling')}: $${fmt(sv)}</div>
  </div>
  <span class="obj-badge ${pos ? 'pos' : 'neg'}" id="rb_${o.id}">${pos ? '+' : ''}$${fmt(Math.abs(r.total))}</span>
  <span class="obj-chevron ${o.open ? 'open' : ''}" id="rch_${o.id}"><svg class="ico ico-sm"><use href="#ic-chevron-d"/></svg></span>
</div>
<div class="obj-body" id="rb_body_${o.id}" ${o.open ? '' : 'style="display:none"'}>
  <div class="field-grid" style="margin-top:.9rem">
    <div class="field full"><label>${t('f_name')}</label><input type="text" id="ro_${o.id}_n" placeholder="${t('f_name')}"></div>
    <div class="field"><label>${t('f_purchase')}</label><div class="iw"><span class="isym">$</span><input type="number" id="ro_${o.id}_p" min="0" step="0.01" placeholder="0.00"></div></div>
    <div class="field"><label>${t('f_selling')}</label><div class="iw"><span class="isym">$</span><input type="number" id="ro_${o.id}_s" min="0" step="0.01" placeholder="0.00"></div></div>
    <div class="field"><label>${t('f_delivery')}</label><div class="iw"><span class="isym">$</span><input type="number" id="ro_${o.id}_d" min="0" step="0.01" placeholder="0.00"></div></div>
    <div class="field"><label>${t('f_commission')}</label><div class="iw"><span class="isym">%</span><input type="number" id="ro_${o.id}_c" min="0" max="100" step="0.1" placeholder="0.0"></div></div>
    <div class="field"><label>${t('f_qty')}</label><input type="number" id="ro_${o.id}_q" min="1" step="1" placeholder="1" class="ns"></div>
  </div>
  <div class="metrics" style="margin-top:.75rem">
    <div class="metric"><div class="m-label">${t('r_profit_per')}</div><div class="m-val ${pos ? 'pos' : 'neg'}" id="rm_per_${o.id}">${pos ? '+' : ''}$${fmt(Math.abs(r.per))}</div></div>
    <div class="metric"><div class="m-label">${t('r_margin')}</div><div class="m-val ${pos ? 'pos' : 'neg'}" id="rm_mg_${o.id}">${r.margin.toFixed(1)}%</div></div>
    <div class="metric"><div class="m-label">${t('r_comm')}</div><div class="m-val" id="rm_cm_${o.id}">$${fmt(r.comm)}</div></div>
  </div>
  <div class="btn-row"><button class="btn danger sm" onclick="removeResaleObj(${o.id})"><svg class="ico ico-sm"><use href="#ic-trash"/></svg>${t('remove')}</button></div>
</div></div>`;
        }

        function toggleRBody(id) {
            const o = rObjs.find(x => x.id === id); if (!o) return;
            o.open = !o.open;
            const b = document.getElementById(`rb_body_${id}`); const c = document.getElementById(`rch_${id}`);
            if (b) b.style.display = o.open ? '' : 'none';
            if (c) c.className = 'obj-chevron' + (o.open ? ' open' : '');
        }
        function syncR(id) {
            const o = rObjs.find(x => x.id === id); if (!o) return;
            [['p', 'purchase'], ['s', 'selling'], ['d', 'delivery'], ['c', 'commission'], ['q', 'qty']].forEach(([k, f]) => {
                const el = document.getElementById(`ro_${id}_${k}`); if (!el) return;
                if (k === 'c') { const v = parseFloat(el.value); if (!isNaN(v) && v > 100) { el.value = '100'; o[f] = '100'; return; } }
                o[f] = el.value;
            });
            const ne = document.getElementById(`ro_${id}_n`); if (ne) o.name = ne.value;
            updateResaleResults();
        }
        function updateResaleResults() {
            rObjs.forEach(o => {
                const r = calcR(o.id); const pos = r.per >= 0;
                sel(`rb_${o.id}`, `${pos ? '+' : ''}$${fmt(Math.abs(r.total))}`);
                scl(`rb_${o.id}`, `obj-badge ${pos ? 'pos' : 'neg'}`);
                sel(`rm_per_${o.id}`, `${pos ? '+' : ''}$${fmt(Math.abs(r.per))}`);
                scl(`rm_per_${o.id}`, `m-val ${pos ? 'pos' : 'neg'}`);
                sel(`rm_mg_${o.id}`, `${r.margin.toFixed(1)}%`);
                scl(`rm_mg_${o.id}`, `m-val ${pos ? 'pos' : 'neg'}`);
                sel(`rm_cm_${o.id}`, `$${fmt(r.comm)}`);
                const sub = document.querySelector(`#roc-${o.id} .obj-sub`);
                if (sub) sub.textContent = `${t('f_qty')}: ${r.qty} · ${t('f_selling')}: $${fmt(r.sell)}`;
            });
            renderResaleSummary(); renderResaleChart();
        }
        function renderResaleSummary() {
            const w = document.getElementById('resaleSummary');
            if (!rObjs.length) { w.innerHTML = ''; return; }
            let rev = 0, cost = 0, profit = 0;
            rObjs.forEach(o => { const r = calcR(o.id); rev += r.sell * r.qty; cost += (r.buy + r.del + r.comm) * r.qty; profit += r.total; });
            const pos = profit >= 0; const mg = rev > 0 ? profit / rev * 100 : 0;
            w.innerHTML = `
<div class="hero ${pos ? 'pos' : 'neg'}"><div class="hero-label">${t('s_total_profit')}</div><div class="hero-val ${pos ? 'pos' : 'neg'}">${pos ? '+' : '−'}$${fmt(Math.abs(profit))}</div></div>
<div class="metrics">
  <div class="metric"><div class="m-label">${t('s_revenue')}</div><div class="m-val">$${fmt(rev)}</div></div>
  <div class="metric"><div class="m-label">${t('s_costs')}</div><div class="m-val">$${fmt(cost)}</div></div>
  <div class="metric"><div class="m-label">${t('s_avg_margin')}</div><div class="m-val ${pos ? 'pos' : 'neg'}">${mg.toFixed(1)}%</div></div>
</div>`;
        }
        function renderResaleChart() {
            const ctx = document.getElementById('resaleChart'); if (!ctx) return;
            const mo = Math.min(120, Math.max(1, parseInt(document.getElementById('chartMonths')?.value) || 12));
            const labels = Array.from({ length: mo }, (_, i) => `M${i + 1}`);
            const isDark = document.documentElement.dataset.theme !== 'light';
            const gc = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
            const tc = isDark ? '#7a7880' : '#6b6875';
            const ds = rObjs.map((o, i) => {
                const r = calcR(o.id);
                return {
                    label: o.name || 'Item ' + o.id, data: labels.map((_, m) => +((m + 1) * r.total).toFixed(2)),
                    borderColor: CAT_COLORS[i % CAT_COLORS.length], borderWidth: 2, tension: .4, fill: false, pointRadius: 2
                };
            });
            if (rChart) try { rChart.destroy() } catch (e) { }
            try {
                rChart = new Chart(ctx, {
                    type: 'line', data: { labels, datasets: ds }, options: {
                        responsive: true, maintainAspectRatio: false, animation: false,
                        plugins: { legend: { labels: { color: tc, font: { family: "'DM Mono'" }, boxWidth: 10, padding: 8 } } },
                        scales: {
                            x: { grid: { color: gc }, ticks: { color: tc, font: { family: "'DM Mono'", size: 10 }, maxTicksLimit: 8 } },
                            y: { grid: { color: gc }, ticks: { color: tc, font: { family: "'DM Mono'", size: 10 }, callback: v => '$' + fmt(v) } }
                        }
                    }
                })
            } catch (e) { console.warn(e) }
        }

        /* ════════════════════════════════════════════
           RENTAL CALCULATOR
        ════════════════════════════════════════════ */
        function addRentalObj(d) {
            const id = ++nId;
            nObjs.push({ id, name: d?.name || '', purchase: d?.purchase || '', income: d?.income || '', expenses: d?.expenses || '', vacancy: d?.vacancy || '', period: d?.period || '12', open: true });
            renderRentalObjs();
        }
        function removeRentalObj(id) { nObjs = nObjs.filter(o => o.id !== id); renderRentalObjs() }

        function calcN(id) {
            const buy = gn(`rn_${id}_p`); const inc = gn(`rn_${id}_i`); const exp = gn(`rn_${id}_e`);
            const vac = Math.min(100, Math.max(0, gn(`rn_${id}_v`)));
            const per = Math.min(600, Math.max(1, Math.round(gn(`rn_${id}_t`)) || 12));
            const eff = inc * (1 - vac / 100); const nm = eff - exp;
            const totNet = nm * per; const roi = buy > 0 ? totNet / buy * 100 : 0;
            const payback = nm > 0 ? buy / nm : null;
            return { buy, inc, exp, vac, per, eff, nm, totInc: eff * per, totExp: exp * per, totNet, roi, payback };
        }

        function renderRentalObjs() {
            const w = document.getElementById('rentalObjects');
            if (!nObjs.length) {
                w.innerHTML = `<div class="empty"><div class="empty-icon"><svg class="ico" style="width:36px;height:36px"><use href="#ic-home"/></svg></div>${t('empty_objects')}</div>`;
                renderRentalSummary(); renderRentalChart(); return;
            }
            w.innerHTML = nObjs.map(o => nObjHTML(o)).join('');
            nObjs.forEach(o => {
                [['p', 'purchase'], ['i', 'income'], ['e', 'expenses'], ['v', 'vacancy'], ['t', 'period']].forEach(([k, f]) => {
                    const el = document.getElementById(`rn_${o.id}_${k}`);
                    if (el) { el.value = o[f] || ''; el.oninput = () => syncN(o.id); }
                });
                const ne = document.getElementById(`rn_${o.id}_n`);
                if (ne) { ne.value = o.name || ''; ne.oninput = () => { o.name = ne.value; sel(`rn_${o.id}_disp`, o.name || t('f_obj_name')); }; }
            });
            updateRentalResults();
        }

        function nObjHTML(o) {
            const r = calcN(o.id); const pos = r.nm >= 0;
            const inc = sn(o.income);
            return `<div class="obj-card" id="noc-${o.id}">
<div class="obj-header" onclick="toggleNBody(${o.id})">
  <div class="obj-left">
    <div class="obj-title" id="rn_${o.id}_disp">${esc(o.name) || t('f_obj_name')}</div>
    <div class="obj-sub">${t('f_period')}: ${o.period || 12} &middot; ${t('f_income')}: $${fmt(inc)}</div>
  </div>
  <span class="obj-badge ${pos ? 'pos' : 'neg'}" id="nb_${o.id}">${pos ? '+' : ''}$${fmt(Math.abs(r.nm))}/mo</span>
  <span class="obj-chevron ${o.open ? 'open' : ''}" id="nch_${o.id}"><svg class="ico ico-sm"><use href="#ic-chevron-d"/></svg></span>
</div>
<div class="obj-body" id="nb_body_${o.id}" ${o.open ? '' : 'style="display:none"'}>
  <div class="field-grid" style="margin-top:.9rem">
    <div class="field full"><label>${t('f_obj_name')}</label><input type="text" id="rn_${o.id}_n" placeholder="${t('f_obj_name')}"></div>
    <div class="field"><label>${t('f_buy')}</label><div class="iw"><span class="isym">$</span><input type="number" id="rn_${o.id}_p" min="0" step="0.01" placeholder="0.00"></div></div>
    <div class="field"><label>${t('f_income')}</label><div class="iw"><span class="isym">$</span><input type="number" id="rn_${o.id}_i" min="0" step="0.01" placeholder="0.00"></div></div>
    <div class="field"><label>${t('f_expenses')}</label><div class="iw"><span class="isym">$</span><input type="number" id="rn_${o.id}_e" min="0" step="0.01" placeholder="0.00"></div></div>
    <div class="field"><label>${t('f_vacancy')}</label><div class="iw"><span class="isym">%</span><input type="number" id="rn_${o.id}_v" min="0" max="100" step="0.1" placeholder="0.0"></div></div>
    <div class="field"><label>${t('f_period')}</label><input type="number" id="rn_${o.id}_t" min="1" max="600" step="1" placeholder="12" class="ns"></div>
  </div>
  <div class="metrics" style="margin-top:.75rem">
    <div class="metric"><div class="m-label">${t('r_net_mo')}</div><div class="m-val ${pos ? 'pos' : 'neg'}" id="nm_mo_${o.id}">${pos ? '+' : ''}$${fmt(Math.abs(r.nm))}</div></div>
    <div class="metric"><div class="m-label">${t('r_total_net')}</div><div class="m-val ${pos ? 'pos' : 'neg'}" id="nm_tn_${o.id}">${pos ? '+' : ''}$${fmt(Math.abs(r.totNet))}</div></div>
    <div class="metric"><div class="m-label">${t('r_roi')}</div><div class="m-val ${r.roi >= 0 ? 'pos' : 'neg'}" id="nm_roi_${o.id}">${r.roi.toFixed(1)}%</div></div>
    <div class="metric"><div class="m-label">${t('r_eff')}</div><div class="m-val" id="nm_eff_${o.id}">$${fmt(r.eff)}</div></div>
    <div class="metric"><div class="m-label">${t('r_payback')}</div><div class="m-val amber" id="nm_pb_${o.id}">${r.payback !== null ? fmt(r.payback) + 'mo' : '∞'}</div></div>
    <div class="metric"><div class="m-label">${t('r_tot_inc')}</div><div class="m-val" id="nm_ti_${o.id}">$${fmt(r.totInc)}</div></div>
  </div>
  <div class="btn-row"><button class="btn danger sm" onclick="removeRentalObj(${o.id})"><svg class="ico ico-sm"><use href="#ic-trash"/></svg>${t('remove')}</button></div>
</div></div>`;
        }

        function toggleNBody(id) {
            const o = nObjs.find(x => x.id === id); if (!o) return;
            o.open = !o.open;
            const b = document.getElementById(`nb_body_${id}`); const c = document.getElementById(`nch_${id}`);
            if (b) b.style.display = o.open ? '' : 'none';
            if (c) c.className = 'obj-chevron' + (o.open ? ' open' : '');
        }
        function syncN(id) {
            const o = nObjs.find(x => x.id === id); if (!o) return;
            [['p', 'purchase'], ['i', 'income'], ['e', 'expenses'], ['v', 'vacancy'], ['t', 'period']].forEach(([k, f]) => {
                const el = document.getElementById(`rn_${id}_${k}`); if (el) o[f] = el.value;
            });
            const ne = document.getElementById(`rn_${id}_n`); if (ne) o.name = ne.value;
            updateRentalResults();
        }
        function updateRentalResults() {
            nObjs.forEach(o => {
                const r = calcN(o.id); const pos = r.nm >= 0;
                sel(`nb_${o.id}`, `${pos ? '+' : ''}$${fmt(Math.abs(r.nm))}/mo`);
                scl(`nb_${o.id}`, `obj-badge ${pos ? 'pos' : 'neg'}`);
                sel(`nm_mo_${o.id}`, `${pos ? '+' : ''}$${fmt(Math.abs(r.nm))}`);
                scl(`nm_mo_${o.id}`, `m-val ${pos ? 'pos' : 'neg'}`);
                sel(`nm_tn_${o.id}`, `${pos ? '+' : ''}$${fmt(Math.abs(r.totNet))}`);
                scl(`nm_tn_${o.id}`, `m-val ${pos ? 'pos' : 'neg'}`);
                sel(`nm_roi_${o.id}`, `${r.roi.toFixed(1)}%`);
                scl(`nm_roi_${o.id}`, `m-val ${r.roi >= 0 ? 'pos' : 'neg'}`);
                sel(`nm_eff_${o.id}`, `$${fmt(r.eff)}`);
                sel(`nm_pb_${o.id}`, r.payback !== null ? `${fmt(r.payback)}mo` : '∞');
                sel(`nm_ti_${o.id}`, `$${fmt(r.totInc)}`);
                const sub = document.querySelector(`#noc-${o.id} .obj-sub`);
                if (sub) sub.textContent = `${t('f_period')}: ${r.per} · ${t('f_income')}: $${fmt(r.inc)}`;
            });
            renderRentalSummary(); renderRentalChart();
        }
        function renderRentalSummary() {
            const w = document.getElementById('rentalSummary');
            if (!nObjs.length) { w.innerHTML = ''; return; }
            let inv = 0, net = 0, inc = 0;
            nObjs.forEach(o => { const r = calcN(o.id); inv += r.buy; net += r.totNet; inc += r.totInc; });
            const pos = net >= 0; const roi = inv > 0 ? net / inv * 100 : 0;
            w.innerHTML = `
<div class="hero ${pos ? 'pos' : 'neg'}"><div class="hero-label">${t('s_return')}</div><div class="hero-val ${pos ? 'pos' : 'neg'}">${pos ? '+' : '−'}$${fmt(Math.abs(net))}</div></div>
<div class="metrics">
  <div class="metric"><div class="m-label">${t('s_invested')}</div><div class="m-val">$${fmt(inv)}</div></div>
  <div class="metric"><div class="m-label">${t('r_tot_inc')}</div><div class="m-val">$${fmt(inc)}</div></div>
  <div class="metric"><div class="m-label">${t('s_port_roi')}</div><div class="m-val ${pos ? 'pos' : 'neg'}">${roi.toFixed(1)}%</div></div>
</div>`;
        }
        function renderRentalChart() {
            const ctx = document.getElementById('rentalChart'); if (!ctx) return;
            const isDark = document.documentElement.dataset.theme !== 'light';
            const gc = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
            const tc = isDark ? '#7a7880' : '#6b6875';
            const maxP = Math.max(...nObjs.map(o => Math.min(120, Math.max(1, parseInt(o.period) || 12))), 12);
            const labels = Array.from({ length: maxP }, (_, i) => `M${i + 1}`);
            const ds = [];
            nObjs.forEach((o, i) => {
                const r = calcN(o.id); const per = Math.min(120, r.per);
                ds.push({ label: (o.name || 'Obj ' + o.id) + ' inc', data: labels.map((_, m) => m < per ? +((r.eff * (m + 1)).toFixed(2)) : null), borderColor: CAT_COLORS[(i * 2) % CAT_COLORS.length], borderWidth: 2, tension: .4, fill: false, pointRadius: 2 });
                ds.push({ label: (o.name || 'Obj ' + o.id) + ' exp', data: labels.map((_, m) => m < per ? +((r.exp * (m + 1)).toFixed(2)) : null), borderColor: CAT_COLORS[(i * 2 + 1) % CAT_COLORS.length], borderWidth: 2, tension: .4, fill: false, pointRadius: 2, borderDash: [4, 4] });
            });
            if (nChart) try { nChart.destroy() } catch (e) { }
            try {
                nChart = new Chart(ctx, {
                    type: 'line', data: { labels, datasets: ds }, options: {
                        responsive: true, maintainAspectRatio: false, animation: false,
                        plugins: { legend: { labels: { color: tc, font: { family: "'DM Mono'" }, boxWidth: 10, padding: 8 } } },
                        scales: {
                            x: { grid: { color: gc }, ticks: { color: tc, font: { family: "'DM Mono'", size: 10 }, maxTicksLimit: 8 } },
                            y: { grid: { color: gc }, ticks: { color: tc, font: { family: "'DM Mono'", size: 10 }, callback: v => '$' + fmt(v) } }
                        }
                    }
                })
            } catch (e) { console.warn(e) }
        }

        /* ════════════════════════════════════════════
           CATEGORIES
        ════════════════════════════════════════════ */
        function openCatModal() {
            document.getElementById('catNameInput').value = '';
            ST.selColor = CAT_COLORS[0];
            renderSwatches();
            openModal('catModal');
        }
        function renderSwatches() {
            document.getElementById('swatchRow').innerHTML = CAT_COLORS.map(c => `<div class="sw ${ST.selColor === c ? 'sel' : ''}" style="background:${c}" onclick="ST.selColor='${c}';renderSwatches()"></div>`).join('');
        }
        function confirmAddCat() {
            const name = document.getElementById('catNameInput').value.trim(); if (!name) return;
            ST.cats.push({ id: 'c' + Date.now(), name, color: ST.selColor });
            saveSt(); rebuildSelects(); renderCatPage(); renderCatSidebar();
            closeModal('catModal'); toast(t('toast_cat'));
        }
        function deleteCat(id) {
            if (!confirm(t('confirm_del_cat'))) return;
            ST.cats = ST.cats.filter(c => c.id !== id);
            ST.saved = ST.saved.map(s => s.catId === id ? { ...s, catId: '' } : s);
            saveSt(); rebuildSelects(); renderCatPage(); renderCatSidebar();
        }
        function renderCatSidebar() {
            const w = document.getElementById('catSidebarList');
            if (!ST.cats.length) { w.innerHTML = ''; return; }
            w.innerHTML = ST.cats.map(c => `
<div class="cat-row" onclick="filterByCat('${c.id}')">
  <span class="cat-dot" style="background:${c.color}"></span>
  <span class="cat-name">${esc(c.name)}</span>

</div>`).join('');
        }
        function renderCatPage() {
            const w = document.getElementById('catPageList');
            if (!ST.cats.length) {
                w.innerHTML = `<div class="empty"><div class="empty-icon"><svg class="ico" style="width:36px;height:36px"><use href="#ic-tag"/></svg></div>${t('empty_cats')}</div>`; return;
            }
            w.innerHTML = ST.cats.map(c => `
<div class="card" style="display:flex;align-items:center;gap:10px;padding:.85rem 1rem">
  <span style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0;display:inline-block"></span>
  <span style="flex:1;font-size:13px">${esc(c.name)}</span>

</div>`).join('');

            goPage('saved');

            renderSavedPage();
        }
        function rebuildSelects() {
            const opts = `<option value="">${t('no_cat')}</option>` + ST.cats.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
            const sc = document.getElementById('saveCatSel'); if (sc) { const v = sc.value; sc.innerHTML = opts; sc.value = v; }
            const fc = document.getElementById('filterCat');
            if (fc) { const v = fc.value; fc.innerHTML = `<option value="">${t('all_cats')}</option>` + ST.cats.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join(''); fc.value = v; }

            if (ft) ft.innerHTML = `<option value="">${t('all_types')}</option><option value="resale">${t('type_resale')}</option><option value="rental">${t('type_rental')}</option>`;

        /* ════════════════════════════════════════════
           SAVE / LOAD
        ════════════════════════════════════════════ */
        function openSaveModal(type) {
            ST.saveTarget = type;
            document.getElementById('saveName').value = '';
            document.getElementById('saveCatSel').value = '';
            rebuildSelects();
            openModal('saveModal');
            setTimeout(() => document.getElementById('saveName').focus(), 200);
        }
        function confirmSave() {
            const name = document.getElementById('saveName').value.trim(); if (!name) return;
            const catId = document.getElementById('saveCatSel').value;
            const type = ST.saveTarget;
            let snap;
            if (type === 'resale') {
                snap = rObjs.map(o => ({ id: o.id, name: o.name, purchase: gn(`ro_${o.id}_p`), selling: gn(`ro_${o.id}_s`), delivery: gn(`ro_${o.id}_d`), commission: gn(`ro_${o.id}_c`), qty: gn(`ro_${o.id}_q`) }));
            } else {
                snap = nObjs.map(o => ({ id: o.id, name: o.name, purchase: gn(`rn_${o.id}_p`), income: gn(`rn_${o.id}_i`), expenses: gn(`rn_${o.id}_e`), vacancy: gn(`rn_${o.id}_v`), period: gn(`rn_${o.id}_t`) }));
            }
            ST.saved.push({ id: 's' + Date.now(), name, type, catId, date: new Date().toLocaleDateString(), snap });
            saveSt(); closeModal('saveModal'); toast(t('toast_saved'));
        }
        function loadSaved(id) {
            const s = ST.saved.find(x => x.id === id); if (!s) return;
            if (s.type === 'resale') {
                rObjs = []; rId = 0; s.snap.forEach(d => addResaleObj(d));
                setTimeout(() => {
                    s.snap.forEach(d => {
                        [['p', 'purchase'], ['s', 'selling'], ['d', 'delivery'], ['c', 'commission'], ['q', 'qty']].forEach(([k, f]) => { const el = document.getElementById(`ro_${d.id}_${k}`); if (el) el.value = d[f] || ''; });
                    }); updateResaleResults();
                }, 60);
                goPage('resale'); switchCalcTab('resale', 'calc');
            } else {
                nObjs = []; nId = 0; s.snap.forEach(d => addRentalObj(d));
                setTimeout(() => {
                    s.snap.forEach(d => {
                        [['p', 'purchase'], ['i', 'income'], ['e', 'expenses'], ['v', 'vacancy'], ['t', 'period']].forEach(([k, f]) => { const el = document.getElementById(`rn_${d.id}_${k}`); if (el) el.value = d[f] || ''; });
                    }); updateRentalResults();
                }, 60);
                goPage('rental'); switchCalcTab('rental', 'calc');
            }
            toast(t('toast_loaded'));
        }
        function deleteSaved(id) {
            if (!confirm(t('confirm_del'))) return;
            ST.saved = ST.saved.filter(s => s.id !== id);
            saveSt(); renderSavedPage(); renderCalcSaved('resale'); renderCalcSaved('rental');
            toast(t('toast_deleted'));
        }
        function openRename(id) {
            ST.renameTarget = id;
            const s = ST.saved.find(x => x.id === id); if (!s) return;
            document.getElementById('renameInput').value = s.name;
            openModal('renameModal');
        }
        function confirmRename() {
            const name = document.getElementById('renameInput').value.trim();
            if (!name || !ST.renameTarget) return;
            const s = ST.saved.find(x => x.id === ST.renameTarget); if (s) s.name = name;
            saveSt(); closeModal('renameModal'); renderSavedPage(); toast(t('toast_renamed'));
        }

        function savedHTML(s) {
            const cat = ST.cats.find(c => c.id === s.catId);
            const cl = s.type === 'resale' ? 'chip g' : 'chip b';
            const tl = s.type === 'resale' ? t('type_resale') : t('type_rental');
            return `<div class="saved-card" onclick="loadSaved('${s.id}')">
<div class="saved-info">
  <div class="saved-name">${esc(s.name)}</div>
  <div class="saved-meta">
    <span class="${cl}">${tl}</span>
    ${cat ? `<span class="cdb"><span class="cdot" style="background:${cat.color}"></span>${esc(cat.name)}</span>` : ''}
    <span>${s.date} &middot; ${t('n_items')((s.snap || []).length)}</span>
  </div>
</div>
<div class="saved-acts">
  <button class="ibc" onclick="event.stopPropagation();shareCalc('${s.id}')" title="Share"><svg class="ico ico-sm"><use href="#ic-share"/></svg></button>
  <button class="ibc" onclick="event.stopPropagation();openRename('${s.id}')"><svg class="ico ico-sm"><use href="#ic-edit"/></svg></button>
  <button class="ibc del" onclick="event.stopPropagation();deleteSaved('${s.id}')"><svg class="ico ico-sm"><use href="#ic-trash"/></svg></button>
</div></div>`;
        }
        function renderSavedPage() {
            const w = document.getElementById('savedPageList');
            const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const cat = document.getElementById('filterCat')?.value || '';
            const type = document.getElementById('filterType')?.value || '';
            let items = ST.saved;
            if (q) items = items.filter(s => s.name.toLowerCase().includes(q));
            if (cat) items = items.filter(s => s.catId === cat);
            if (type) items = items.filter(s => s.type === type);
            if (!items.length) { w.innerHTML = `<div class="empty"><div class="empty-icon"><svg class="ico" style="width:36px;height:36px"><use href="#ic-folder"/></svg></div>${t('empty_saved')}</div>`; return; }
            w.innerHTML = items.map(s => savedHTML(s)).join('');
        }
        function renderCalcSaved(type) {
            const w = document.getElementById(`${type}SavedList`); if (!w) return;
            const items = ST.saved.filter(s => s.type === type);
            if (!items.length) { w.innerHTML = `<div class="empty"><div class="empty-icon"><svg class="ico" style="width:36px;height:36px"><use href="#ic-folder"/></svg></div>${t('empty_saved_type')}</div>`; return; }
            w.innerHTML = items.map(s => savedHTML(s)).join('');
        }
        function updateBadges() {
            const n = ST.saved.length;
            const s = String(n);
            const si = document.getElementById('siBadge'); if (si) si.textContent = s;
            const bn = document.getElementById('bnBadge'); if (bn) { bn.textContent = s; bn.style.display = n ? 'block' : 'none'; }
        }

        /* ════════════════════════════════════════════
           SHARE
        ════════════════════════════════════════════ */
        let _sharedSnap = null; // holds decoded snap for import

        function shareCalc(id) {
            const s = ST.saved.find(x => x.id === id); if (!s) return;
            // Encode: name, type, catId, catName, catColor, date, snap
            const cat = ST.cats.find(c => c.id === s.catId);
            const payload = {
                n: s.name,
                t: s.type,
                cn: cat ? cat.name : '',
                cc: cat ? cat.color : '',
                d: s.date,
                s: s.snap
            };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
            const url = location.href.split('#')[0] + '#share=' + encoded;
            document.getElementById('shareUrlInput').value = url;
            applyI18n(); // refresh button labels
            openModal('shareModal');
            setTimeout(() => { document.getElementById('shareUrlInput').select(); }, 200);
        }

        function copyShareUrl() {
            const input = document.getElementById('shareUrlInput');
            const url = input.value;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => toast(t('toast_copied'))).catch(() => fallbackCopy(input));
            } else {
                fallbackCopy(input);
            }
            // Flash button
            const btn = document.getElementById('copyUrlBtn');
            if (btn) {
                btn.style.background = 'var(--accent)'; btn.style.color = '#0d0d0f';
                setTimeout(() => { btn.style.background = ''; btn.style.color = ''; }, 900);
            }
        }

        function fallbackCopy(input) {
            input.select();
            try { document.execCommand('copy'); toast(t('toast_copied')); } catch (e) { }
        }

        function checkShareInUrl() {
            const hash = location.hash;
            if (!hash.startsWith('#share=')) return;
            const encoded = hash.slice(7);
            try {
                const payload = JSON.parse(decodeURIComponent(escape(atob(encoded))));
                _sharedSnap = payload;
                renderSharedView(payload);
                openModal('sharedViewModal');
                // clear hash so refresh doesn't re-open
                history.replaceState(null, '', location.pathname + location.search);
            } catch (e) {
                console.warn('Invalid share link', e);
            }
        }

        function renderSharedView(p) {
            document.getElementById('sharedViewTitle').textContent = p.n || 'Calculation';
            const w = document.getElementById('sharedViewBody');
            const isResale = p.t === 'resale';
            let html = '';

            // type badge
            html += `<div class="sv-type ${isResale ? 'g' : 'b'}">${isResale ? 'Resale' : 'Rental'}</div>`;

            // category
            if (p.cn) { html += `<div class="sv-cat"><span style="width:7px;height:7px;border-radius:50%;background:${p.cc || 'var(--text3)'};display:inline-block"></span>${esc(p.cn)}</div>`; }

            // date
            if (p.d) { html += `<div style="font-size:10px;color:var(--text2);margin-bottom:.75rem">${p.d}</div>`; }

            // items
            if (isResale) {
                (p.s || []).forEach(o => {
                    const sell = +o.selling || 0, buy = +o.purchase || 0, del = +o.delivery || 0;
                    const cp = Math.min(100, Math.max(0, +o.commission || 0));
                    const qty = Math.max(1, Math.round(+o.qty) || 1);
                    const comm = sell * cp / 100;
                    const per = sell - buy - del - comm;
                    const total = per * qty;
                    const margin = sell > 0 ? per / sell * 100 : 0;
                    const pos = per >= 0;
                    html += `<div class="sv-item">
        <div class="sv-item-title"><svg class="ico ico-sm" style="color:var(--text3)"><use href="#ic-box"/></svg>${esc(o.name || 'Item')}</div>
        <div class="sv-metrics">
          <div class="sv-metric"><div class="sv-ml">Purchase</div><div class="sv-mv">$${fmt(buy)}</div></div>
          <div class="sv-metric"><div class="sv-ml">Selling</div><div class="sv-mv">$${fmt(sell)}</div></div>
          <div class="sv-metric"><div class="sv-ml">Delivery</div><div class="sv-mv">$${fmt(del)}</div></div>
          <div class="sv-metric"><div class="sv-ml">Commission</div><div class="sv-mv">${cp}%</div></div>
          <div class="sv-metric"><div class="sv-ml">Qty</div><div class="sv-mv">${qty}</div></div>
          <div class="sv-metric"><div class="sv-ml">Profit/item</div><div class="sv-mv ${pos ? 'pos' : 'neg'}">${pos ? '+' : ''}$${fmt(Math.abs(per))}</div></div>
          <div class="sv-metric"><div class="sv-ml">Total profit</div><div class="sv-mv ${pos ? 'pos' : 'neg'}">${pos ? '+' : ''}$${fmt(Math.abs(total))}</div></div>
          <div class="sv-metric"><div class="sv-ml">Margin</div><div class="sv-mv ${pos ? 'pos' : 'neg'}">${margin.toFixed(1)}%</div></div>
        </div>
      </div>`;
                });
            } else {
                (p.s || []).forEach(o => {
                    const buy = +o.purchase || 0, inc = +o.income || 0, exp = +o.expenses || 0;
                    const vac = Math.min(100, Math.max(0, +o.vacancy || 0));
                    const per = Math.min(600, Math.max(1, Math.round(+o.period) || 12));
                    const eff = inc * (1 - vac / 100);
                    const nm = eff - exp;
                    const totNet = nm * per;
                    const roi = buy > 0 ? totNet / buy * 100 : 0;
                    const payback = nm > 0 ? buy / nm : null;
                    const pos = nm >= 0;
                    html += `<div class="sv-item">
        <div class="sv-item-title"><svg class="ico ico-sm" style="color:var(--text3)"><use href="#ic-home"/></svg>${esc(o.name || 'Object')}</div>
        <div class="sv-metrics">
          <div class="sv-metric"><div class="sv-ml">Purchase</div><div class="sv-mv">$${fmt(buy)}</div></div>
          <div class="sv-metric"><div class="sv-ml">Income/mo</div><div class="sv-mv">$${fmt(inc)}</div></div>
          <div class="sv-metric"><div class="sv-ml">Expenses</div><div class="sv-mv">$${fmt(exp)}</div></div>
          <div class="sv-metric"><div class="sv-ml">Vacancy</div><div class="sv-mv">${vac}%</div></div>
          <div class="sv-metric"><div class="sv-ml">Period</div><div class="sv-mv">${per} mo</div></div>
          <div class="sv-metric"><div class="sv-ml">Net/month</div><div class="sv-mv ${pos ? 'pos' : 'neg'}">${pos ? '+' : ''}$${fmt(Math.abs(nm))}</div></div>
          <div class="sv-metric"><div class="sv-ml">Total net</div><div class="sv-mv ${pos ? 'pos' : 'neg'}">${pos ? '+' : ''}$${fmt(Math.abs(totNet))}</div></div>
          <div class="sv-metric"><div class="sv-ml">ROI</div><div class="sv-mv ${roi >= 0 ? 'pos' : 'neg'}">${roi.toFixed(1)}%</div></div>
          <div class="sv-metric"><div class="sv-ml">Payback</div><div class="sv-mv amber">${payback !== null ? fmt(payback) + 'mo' : '∞'}</div></div>
        </div>
      </div>`;
                });
            }

            w.innerHTML = html;
        }

        function importSharedCalc() {
            if (!_sharedSnap) return;
            const p = _sharedSnap;
            const isResale = p.t === 'resale';
            // create category if needed
            let catId = '';
            if (p.cn && p.cc) {
                const existing = ST.cats.find(c => c.name === p.cn && c.color === p.cc);
                if (existing) { catId = existing.id; }
                else { catId = 'c' + Date.now(); ST.cats.push({ id: catId, name: p.cn, color: p.cc }); }
            }
            const snap = (p.s || []).map((o, i) => ({ ...o, id: i + 1 }));
            ST.saved.push({ id: 's' + Date.now(), name: p.n, type: p.t, catId, date: p.d || new Date().toLocaleDateString(), snap });
            saveSt();
            renderCatSidebar(); renderCatPage(); rebuildSelects();
            closeModal('sharedViewModal');
            toast(t('toast_imported'));
            goPage('saved');
        }

        /* ════════════════════════════════════════════
           EXPORT
        ════════════════════════════════════════════ */
        function exportData() {
            const d = { exported: new Date().toISOString(), saved: ST.saved, categories: ST.cats };
            const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'profitlab-export.json'; a.click();
            toast(t('toast_exported'));
        }


        /* ════════════════════════════════════════════
           SUPABASE AUTH + CLOUD SYNC
        ════════════════════════════════════════════ */
        const SUPA_URL = 'https://chsdnjvvcfmkhvcicfbq.supabase.co';
        const SUPA_KEY = 'sb_publishable_CZ9DCaLEskJ4uenatAoGTg_jbt2bvn1';
        const supa = supabase.createClient(SUPA_URL, SUPA_KEY, {
            auth: {
                persistSession: true,
                detectSessionInUrl: true,
                flowType: 'implicit',
                lock: async (name, acquireTimeout, fn) => fn(),
            }
        });
        window._supa = supa; window._ST = ST;

        let _currentUser = null;
        let _skipAuth = false;
        const SKIP_KEY = 'profitlab_skip_auth';

        /* ── Auth tab switch ── */
        function switchAuthTab(tab) {
            const isSignup = tab === 'signup';
            document.getElementById('tabLogin').classList.toggle('active', !isSignup);
            document.getElementById('tabSignup').classList.toggle('active', isSignup);
            document.getElementById('authSubmit').textContent = isSignup ? 'Create account' : 'Sign in';
            document.getElementById('confirmField').style.display = isSignup ? '' : 'none';
            document.getElementById('authConfirm').value = '';
            clearAuthError();
        }

        function showAuthError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg; el.classList.add('show');
        }
        function clearAuthError() {
            document.getElementById('authError').classList.remove('show');
        }

        /* ── Submit auth form ── */
        async function submitAuth() {
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const isSignup = document.getElementById('tabSignup').classList.contains('active');
            const btn = document.getElementById('authSubmit');

            clearAuthError();
            if (!email || !password) { showAuthError('Please fill in all fields.'); return; }
            if (password.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }

            if (isSignup) {
                const confirm = document.getElementById('authConfirm').value;
                if (password !== confirm) { showAuthError('Passwords do not match.'); return; }
            }

            btn.disabled = true;
            btn.textContent = isSignup ? 'Creating account…' : 'Signing in…';

            try {
                let result;
                if (isSignup) {
                    result = await supa.auth.signUp({ email, password });
                    if (result.error) throw result.error;
                    // If session is null after signup, email confirmation is required
                    if (!result.data?.session) {
                        btn.disabled = false;
                        btn.textContent = 'Create account';
                        showAuthError('✉️ Check your email and click the confirmation link, then sign in.');
                        return;
                    }
                } else {
                    result = await supa.auth.signInWithPassword({ email, password });
                    if (result.error) throw result.error;
                }
                // onAuthStateChange will handle the rest
            } catch (err) {
                showAuthError(friendlyAuthError(err.message || err));
                btn.disabled = false;
                btn.textContent = isSignup ? 'Create account' : 'Sign in';
            }
        }

        function friendlyAuthError(msg) {
            if (/invalid.*credentials|wrong password|invalid login/i.test(msg)) return 'Wrong email or password.';
            if (/email.*not confirmed/i.test(msg)) return 'Please confirm your email first.';
            if (/already registered|already.*use/i.test(msg)) return 'This email is already registered. Try signing in.';
            if (/weak.*password/i.test(msg)) return 'Password is too weak. Use at least 6 characters.';
            if (/network|fetch/i.test(msg)) return 'Network error. Check your connection.';
            return msg;
        }

        /* ── Skip auth ── */
        function skipAuth() {
            _skipAuth = true;
            localStorage.setItem(SKIP_KEY, '1');
            hideAuthWall();
        }

        function hideAuthWall() {
            const w = document.getElementById('authWall');
            w.classList.add('hidden');
            setTimeout(() => w.style.display = 'none', 300);
        }

        /* ── Sign out ── */
        async function signOut() {
            closeUserMenu();
            const btn = event?.target;
            if (btn) btn.textContent = 'Signing out…';
            try { await supa.auth.signOut(); } catch (e) { console.warn(e); }
            _currentUser = null;
            // clear in-memory data, reload from localStorage
            ST.saved = []; ST.cats = [];
            loadSt();
            applyI18n(); renderCatSidebar(); renderCatPage(); updateBadges(); renderSavedPage();
            // show auth wall again
            const w = document.getElementById('authWall');
            w.style.display = 'flex';
            setTimeout(() => w.classList.remove('hidden'), 10);
            document.getElementById('userPill').style.display = 'none';
            localStorage.removeItem(SKIP_KEY);
        }

        /* ── User pill / menu ── */
        function toggleUserMenu(e) {
            e.stopPropagation();
            const m = document.getElementById('userMenu');
            const isOpen = m.classList.contains('open');
            if (isOpen) { m.classList.remove('open'); }
            else { m.classList.add('open'); }
        }
        function closeUserMenu() {
            document.getElementById('userMenu')?.classList.remove('open');
        }
        // Close user menu on outside click (not on pill itself — that's handled by toggleUserMenu)
        document.addEventListener('click', function (e) {
            const pill = document.getElementById('userPill');
            if (pill && !pill.contains(e.target)) closeUserMenu();
        });

        function updateUserPill(user) {
            const pill = document.getElementById('userPill');
            const avatar = document.getElementById('userAvatar');
            const emailEl = document.getElementById('userMenuEmail');
            if (!user) { pill.style.display = 'none'; return; }
            pill.style.display = 'flex';
            const letter = (user.email || '?')[0].toUpperCase();
            avatar.textContent = letter;
            emailEl.textContent = user.email || '';
        }

        /* ── Sync indicator ── */
        function setSyncState(state) {
            const d = document.getElementById('syncDot');
            if (!d) return;
            d.className = 'sync-dot ' + state;
        }

        /* ════════════════════════════════════════════
           CLOUD SYNC — Supabase storage per user
           Table: user_data (user_id TEXT PK, saved JSONB, cats JSONB)
        ════════════════════════════════════════════ */
        async function cloudLoad(retry = 0) {
            if (!_currentUser) return;
            // Wait for Supabase auth lock to fully settle before any request
            const delay = retry === 0 ? 2000 : 2000 * (retry + 1);
            await new Promise(r => setTimeout(r, delay));
            if (!_currentUser) return; // user may have logged out during wait
            setSyncState('syncing');
            try {
                const { data, error } = await supa
                    .from('user_data')
                    .select('saved,cats')
                    .eq('user_id', _currentUser.id)
                    .maybeSingle();
                if (error) {
                    console.warn('[sync] load error:', error.code, error.message, error.details);
                    throw error;
                }
                if (data) {
                    ST.saved = data.saved || [];
                    ST.cats = data.cats || [];
                }
                setSyncState('synced');
            } catch (e) {
                if ((e?.message || e?.name || String(e)).includes('AbortError') && retry < 4) {
                    cloudLoad(retry + 1); return;
                }
                console.warn('[sync] load failed:', e?.code, e?.message, e?.details);
                setSyncState('error');
                loadSt();
            }
            applyI18n(); renderCatSidebar(); renderCatPage(); updateBadges();
            renderSavedPage(); renderCalcSaved('resale'); renderCalcSaved('rental');
        }

        let _saveTimer = null;
        async function cloudSave() {
            if (!_currentUser) { saveStLocal(); return; }
            saveStLocal();
            setSyncState('syncing');
            // Debounce — batch rapid saves into one request
            clearTimeout(_saveTimer);
            _saveTimer = setTimeout(async () => {
                try {
                    const { error } = await supa
                        .from('user_data')
                        .upsert({
                            user_id: _currentUser.id,
                            saved: ST.saved,
                            cats: ST.cats,
                            updated_at: new Date().toISOString()
                        }, { onConflict: 'user_id' });
                    if (error) throw error;
                    setSyncState('synced');
                } catch (e) {
                    if ((e?.message || e?.name || '').includes('AbortError')) {
                        // Lock contention (dev/live-reload) — not a real error, retry
                        setTimeout(() => cloudSave(), 1500); return;
                    }
                    console.warn('[sync] save failed:', e?.code, e?.message, e?.details, e);
                    setSyncState('error');
                }
            }, 600);
        }

        /* saveSt now calls cloudSave directly — see saveStLocal above */

        /* ── Auth state listener ── */
        supa.auth.onAuthStateChange(async (event, session) => {
            const user = session?.user || null;
            _currentUser = user;
            if (user) {
                hideAuthWall();
                updateUserPill(user);
                // Only sync on explicit sign-in events, not on every session refresh
                if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
                    await cloudLoad();
                }
            } else if (event === 'SIGNED_OUT') {
                updateUserPill(null);
            }
        });

        /* ── Init auth ── */
        async function initAuth() {
            // Wait for any previous page's auth lock to release
            await new Promise(r => setTimeout(r, 1200));

            let session = null;
            // Retry getSession up to 5 times if AbortError
            for (let i = 0; i < 5; i++) {
                try {
                    const res = await supa.auth.getSession();
                    session = res.data?.session;
                    break;
                } catch (e) {
                    if (i === 4) break;
                    await new Promise(r => setTimeout(r, 800 * (i + 1)));
                }
            }

            if (session?.user) {
                _currentUser = session.user;
                hideAuthWall();
                updateUserPill(session.user);
                await cloudLoad();
                return;
            }
            if (localStorage.getItem(SKIP_KEY) === '1') {
                _skipAuth = true;
                hideAuthWall();
                return;
            }
        }

        /* ════════════════════════════════════════════
           MODALS
        ════════════════════════════════════════════ */
        function openModal(id) { document.getElementById(id).classList.remove('hidden') }
        function closeModal(id) { document.getElementById(id).classList.add('hidden') }
        document.querySelectorAll('.overlay').forEach(el => el.addEventListener('click', function (e) { if (e.target === this) this.classList.add('hidden') }));

        /* ════════════════════════════════════════════
           TOAST
        ════════════════════════════════════════════ */
        let toastT;
        function toast(msg) {
            const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
            clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2000);
        }

        /* ════════════════════════════════════════════
           INIT
        ════════════════════════════════════════════ */
        loadSt();
        // determine language
        const sysLang = (navigator.language || 'en').substring(0, 2);
        if (!['en', 'ru', 'uk'].includes(ST.lang)) ST.lang = ['en', 'ru', 'uk'].includes(sysLang) ? sysLang : 'en';
        const lb = document.getElementById('langLabel'); if (lb) lb.textContent = LANG_LABELS[ST.lang] || ST.lang.toUpperCase();

        applyI18n();
        rebuildSelects();
        renderCatSidebar();
        renderCatPage();
        updateBadges();
        onResize();

        addResaleObj();
        addRentalObj();

        setTimeout(() => { renderResaleChart(); renderRentalChart(); }, 150);
        setTimeout(() => checkShareInUrl(), 200);
        initAuth();
    </script>

    <!-- PWA INSTALL BANNER -->
    <div class="install-banner" id="installBanner">
        <div class="install-banner-icon">
            <svg width="22" height="22" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" viewBox="0 0 24 24">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
        </div>
        <div class="install-banner-text">
            <div class="install-banner-title">Profit Lab</div>
            <div class="install-banner-sub">Install for offline access</div>
        </div>
        <div class="install-banner-btns">
            <button onclick="dismissInstall()">Later</button>
            <button class="ib-install" onclick="triggerInstall()">Install</button>
        </div>
    </div>


    <script>
        /* ─── SERVICE WORKER REGISTRATION ─── */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('[PWA] SW registered, scope:', reg.scope);
                        // Check for updates every time app loads
                        reg.update();
                    })
                    .catch(err => console.warn('[PWA] SW registration failed:', err));
            });
        }

        /* ─── INSTALL PROMPT ─── */
        let _deferredPrompt = null;
        const INSTALL_DISMISSED_KEY = 'profitlab_install_dismissed';

        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            _deferredPrompt = e;
            // Don't show if user dismissed within last 7 days
            const dismissed = localStorage.getItem(INSTALL_DISMISSED_KEY);
            if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 3600 * 1000) return;
            // Show banner after 3s
            setTimeout(showInstallBanner, 3000);
        });

        function showInstallBanner() {
            const b = document.getElementById('installBanner');
            if (b) b.classList.add('show');
        }
        function dismissInstall() {
            const b = document.getElementById('installBanner');
            if (b) b.classList.remove('show');
            localStorage.setItem(INSTALL_DISMISSED_KEY, String(Date.now()));
            _deferredPrompt = null;
        }
        async function triggerInstall() {
            if (!_deferredPrompt) {
                dismissInstall(); return;
            }
            _deferredPrompt.prompt();
            const { outcome } = await _deferredPrompt.userChoice;
            console.log('[PWA] Install outcome:', outcome);
            _deferredPrompt = null;
            dismissInstall();
        }

        // Hide banner once installed
        window.addEventListener('appinstalled', () => {
            dismissInstall();
            console.log('[PWA] App installed');
        });

        // Handle shortcut URL fragments on launch
        window.addEventListener('DOMContentLoaded', () => {
            const hash = location.hash;
            if (hash === '#resale') goPage('resale');
            else if (hash === '#rental') goPage('rental');
        });
    </script>


    <!-- AUTH WALL -->

            <div class="auth-field">
                <label>Password</label>
                <input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter')submitAuth()">
            </div>
            <div class="auth-field" id="confirmField" style="display:none">
                <label>Confirm password</label>
                <input type="password" id="authConfirm" placeholder="••••••••" autocomplete="new-password"
                    onkeydown="if(event.key==='Enter')submitAuth()">
            </div>
            <button class="auth-submit" id="authSubmit" onclick="submitAuth()">Sign in</button>
